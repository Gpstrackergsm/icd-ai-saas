<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — ICD Smart Search</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .wrapper { max-width: 720px; margin: 80px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .error { background: #fdecea; color: #7f1d1d; padding: 16px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Something went wrong</h1>
    <p class="error">We couldn't complete your request. Please try again or contact support if this persists.</p>
    <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
      <a class="btn button-primary" href="/">Back to home</a>
      <a class="btn button-outline" href="/pricing">View pricing</a>
    </div>
  </div>
</body>
</html>
